<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>釣銭準備</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">
  <div class="max-w-2xl mx-auto p-4">
    <h1 class="text-2xl font-bold mb-4 text-center">釣銭準備</h1>

    <div id="input-area" class="grid grid-cols-1 sm:grid-cols-2 gap-4 mb-6"></div>

    <button onclick="calculateShortage()" class="w-full bg-blue-500 text-white py-2 rounded mb-4">不足を計算する</button>
    <button onclick="adjustShortage()" class="w-full bg-green-500 text-white py-2 rounded">調整</button>

    <div id="shortageResult" class="mt-6 bg-white p-4 rounded shadow whitespace-pre-wrap"></div>
    <div id="adjustmentResult" class="mt-6 bg-white p-4 rounded shadow whitespace-pre-wrap"></div>
    <div id="changeCollectionResult" class="mt-6 bg-white p-4 rounded shadow whitespace-pre-wrap"></div>
  </div>

  <script>
    // --- 設定値 ---
    const denominations = [10000, 5000, 2000, 1000, 500, 100, 50, 10, 5, 1];
    const baseTargets = {
      10000: 0,
      5000: 15,
      2000: 0,
      1000: 42,
      500: 50,
      100: 100,
      50: 50,
      10: 100,
      5: 16,
      1: 20
    };

    // --- UI生成 ---
    const inputArea = document.getElementById("input-area");
    denominations.forEach(denom => {
      const wrapper = document.createElement("div");
      wrapper.className = "flex items-center space-x-2 min-w-0";
      wrapper.innerHTML = `
        <label class="w-20 font-medium">${denom}円</label>
        <input id="input${denom}" type="number" min="0" value="" class="flex-1 p-1 border rounded w-full" />
      `;
      inputArea.appendChild(wrapper);
    });

    // 入力値取得
    function getInput() {
      const input = {};
      denominations.forEach(denom => {
        const val = document.getElementById(`input${denom}`).value;
        input[denom] = val === "" ? 0 : parseInt(val, 10);
      });
      return input;
    }

    // --- 不足計算 ---
    function calculateShortage() {
      const input = getInput();
      let resultText = `【現在の不足状況】\n`;
      let totalShortage = 0;
      let hasShortage = false;

      for (let denom of denominations) {
        const diff = baseTargets[denom] - input[denom];
        if (diff > 0) {
          resultText += `${denom}円×${diff}枚 = ${(denom * diff).toLocaleString()}円\n`;
          totalShortage += denom * diff;
          hasShortage = true;
        }
      }

      if (!hasShortage) {
        resultText += "不足はありません。";
      } else {
        resultText += `合計　${totalShortage.toLocaleString()}円`;
      }
      
      document.getElementById("shortageResult").innerText = resultText;
      document.getElementById("adjustmentResult").innerText = "";
      document.getElementById("changeCollectionResult").innerText = "";
    }

    // --- 調整機能 (2段階探索ロジック) ---
    async function adjustShortage() {
      const input = getInput();
      
      // 1. 不足額（ターゲット）計算
      const originalShortageCounts = {};
      let targetAmount = 0;
      for (let denom of denominations) {
        const diff = baseTargets[denom] - input[denom];
        if (diff > 0) {
          originalShortageCounts[denom] = diff;
          targetAmount += denom * diff;
        }
      }

      if (targetAmount === 0) {
        document.getElementById("adjustmentResult").innerText = "不足がないため、調整の必要はありません。";
        document.getElementById("changeCollectionResult").innerText = "";
        return;
      }

      document.getElementById("adjustmentResult").innerText = "計算中...";
      await new Promise(r => setTimeout(r, 10)); 

      // 2. 探索用リソースの準備
      
      // A: 余剰金のみ (優先的に使う)
      const surplusResources = [];
      let surplusTotal = 0;
      for (let denom of denominations) {
        const surplus = input[denom] - baseTargets[denom];
        if (surplus > 0) {
          surplusResources.push({ denom: denom, count: surplus });
          surplusTotal += denom * surplus;
        }
      }

      // B: 全所持金 (余剰が足りない場合の予備)
      const allResources = [];
      let inputTotal = 0;
      for (let denom of denominations) {
        if (input[denom] > 0) {
          allResources.push({ denom: denom, count: input[denom] });
          inputTotal += denom * input[denom];
        }
      }

      // 3. 探索実行
      let bestPayment = null;
      let sourceMode = "surplus"; // どっちの資金を使ったか記録

      // STEP 1: 余剰金だけで、不足額をカバーできるか？
      if (surplusTotal >= targetAmount) {
         bestPayment = findClosestPayment(surplusResources, targetAmount);
      }

      // STEP 2: 余剰金で無理だった場合、全所持金を使う
      if (!bestPayment) {
         if (inputTotal < targetAmount) {
            // 全財産合わせても足りない
            document.getElementById("adjustmentResult").innerText = `※ 調整失敗\n手持ち現金合計(${inputTotal.toLocaleString()}円)が不足額(${targetAmount.toLocaleString()}円)より少ないため、補填できません。`;
            document.getElementById("changeCollectionResult").innerText = "";
            return;
         }
         sourceMode = "all";
         bestPayment = findClosestPayment(allResources, targetAmount);
      }

      if (!bestPayment) {
        document.getElementById("adjustmentResult").innerText = `※ 計算エラー\n有効な組み合わせが見つかりませんでした。`;
        return;
      }

      const { combo: payCombo, amount: payAmount } = bestPayment;
      const changeAmount = payAmount - targetAmount;

      // 4. 結果表示
      
      // A. 封筒に入れる
      let adjustmentText = "";
      if (sourceMode === "all") {
        adjustmentText += "※ 余剰金だけでは足りないため、\n   確保分を含む手持ち金から両替を行います。\n\n";
      }
      adjustmentText += `【銀行へ持っていく】(封筒に入れる)\n`;
      
      let payTotalCheck = 0;
      const sortedPayKeys = Object.keys(payCombo).map(Number).sort((a,b) => b - a);
      
      for (let denom of sortedPayKeys) {
        const count = payCombo[denom];
        if (count > 0) {
          adjustmentText += `${denom}円×${count}枚 = ${(denom * count).toLocaleString()}円\n`;
          payTotalCheck += denom * count;
        }
      }
      adjustmentText += `合計　${payTotalCheck.toLocaleString()}円`;
      
      document.getElementById("adjustmentResult").innerText = adjustmentText;

      // B. ドロアへ補充 (不足分 + お釣り分)
      const changeBreakdown = getBreakdown(changeAmount);
      
      const finalReceive = { ...originalShortageCounts };
      for (let denom of denominations) {
        if (changeBreakdown[denom]) {
          finalReceive[denom] = (finalReceive[denom] || 0) + changeBreakdown[denom];
        }
      }

      let collectionText = `【銀行から戻ったら】(ドロアへ補充)\n`;
      for (let denom of denominations) {
        if (finalReceive[denom]) {
           let note = "";
           const original = originalShortageCounts[denom] || 0;
           const added = changeBreakdown[denom] || 0;
           
           if (added > 0 && original > 0) note = ` (不足${original} + 釣${added})`;
           else if (added > 0) note = ` (全額お釣り)`;
           
           collectionText += `${denom}円×${finalReceive[denom]}枚${note}\n`;
        }
      }
      collectionText += `合計　${payAmount.toLocaleString()}円 (封筒と同額)\n`;
      collectionText += `----------------\n`;
      
      if (changeAmount > 0) {
        collectionText += `※ ${changeAmount.toLocaleString()}円分 多めに受け取って調整済`;
      } else {
        collectionText += `※ ぴったり交換`;
      }
      
      document.getElementById("changeCollectionResult").innerText = collectionText;
    }

    // --- アルゴリズム: 不足額以上になる最小構成を探す ---
    function findClosestPayment(resources, minTarget) {
      let bestAmount = Infinity;
      let bestCombo = null;

      function search(index, currentAmount, currentCombo) {
        // 枝刈り
        if (currentAmount >= bestAmount) return;

        // 解の更新
        if (currentAmount >= minTarget) {
          bestAmount = currentAmount;
          bestCombo = { ...currentCombo };
          return;
        }

        if (index >= resources.length) return;

        const coin = resources[index];
        const denom = coin.denom;
        const maxCount = coin.count;

        // 枚数探索 (0 ~ max)
        for (let i = 0; i <= maxCount; i++) {
          const val = denom * i;
          currentCombo[denom] = i;
          
          search(index + 1, currentAmount + val, currentCombo);
          
          if (i === maxCount) delete currentCombo[denom];
        }
        delete currentCombo[denom];
      }

      search(0, 0, {});
      return bestCombo ? { combo: bestCombo, amount: bestAmount } : null;
    }

    // お釣り分解用
    function getBreakdown(amount) {
      const breakdown = {};
      let remain = amount;
      for (let denom of denominations) {
        if (remain >= denom) {
          const count = Math.floor(remain / denom);
          if (count > 0) {
            breakdown[denom] = count;
            remain %= denom;
          }
        }
      }
      return breakdown;
    }
  </script>
</body>
</html>
