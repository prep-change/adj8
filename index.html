<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>釣銭準備</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">
  <div class="max-w-2xl mx-auto p-4">
    <h1 class="text-2xl font-bold mb-4 text-center">釣銭準備</h1>

    <div id="input-area" class="grid grid-cols-1 sm:grid-cols-2 gap-4 mb-6"></div>

    <button onclick="calculateShortage()" class="w-full bg-blue-500 text-white py-2 rounded mb-4">不足を計算する</button>
    <button onclick="adjustShortage()" class="w-full bg-green-500 text-white py-2 rounded">調整</button>

    <div id="shortageResult" class="mt-6 bg-white p-4 rounded shadow whitespace-pre-wrap"></div>
    <div id="adjustmentResult" class="mt-6 bg-white p-4 rounded shadow whitespace-pre-wrap"></div>
    <div id="changeCollectionResult" class="mt-6 bg-white p-4 rounded shadow whitespace-pre-wrap"></div>
  </div>

  <script>
    // --- 設定値 ---
    const denominations = [10000, 5000, 2000, 1000, 500, 100, 50, 10, 5, 1];
    const baseTargets = {
      10000: 0,
      5000: 15,
      2000: 0,
      1000: 42,
      500: 50,
      100: 100,
      50: 50,
      10: 100,
      5: 16,
      1: 20
    };

    // --- UI生成 (初期コードと同じ) ---
    const inputArea = document.getElementById("input-area");
    denominations.forEach(denom => {
      const wrapper = document.createElement("div");
      wrapper.className = "flex items-center space-x-2 min-w-0";
      wrapper.innerHTML = `
        <label class="w-20 font-medium">${denom}円</label>
        <input id="input${denom}" type="number" min="0" value="" class="flex-1 p-1 border rounded w-full" />
      `;
      inputArea.appendChild(wrapper);
    });

    // 入力値取得ヘルパー
    function getInput() {
      const input = {};
      denominations.forEach(denom => {
        const val = document.getElementById(`input${denom}`).value;
        input[denom] = val === "" ? 0 : parseInt(val, 10);
      });
      return input;
    }

    // --- 不足計算機能 (UI出力先は変えず、ロジックのみ整理) ---
    function calculateShortage() {
      const input = getInput();
      let resultText = `【現在の不足状況】\n`;
      let totalShortage = 0;
      let hasShortage = false;

      for (let denom of denominations) {
        const diff = baseTargets[denom] - input[denom];
        if (diff > 0) {
          resultText += `${denom}円×${diff}枚 = ${(denom * diff).toLocaleString()}円\n`;
          totalShortage += denom * diff;
          hasShortage = true;
        }
      }

      if (!hasShortage) {
        resultText += "不足はありません。";
      } else {
        resultText += `合計　${totalShortage.toLocaleString()}円`;
      }
      
      // 元のUIIDに出力
      document.getElementById("shortageResult").innerText = resultText;
      document.getElementById("adjustmentResult").innerText = "";
      document.getElementById("changeCollectionResult").innerText = "";
    }

    // --- 調整機能 (見た目は変えず、中身を「完全一致モード」に変更) ---
    async function adjustShortage() {
      const input = getInput();
      
      // 1. 不足額（ターゲット）の計算
      const shortageCounts = {};
      let targetAmount = 0;
      for (let denom of denominations) {
        const diff = baseTargets[denom] - input[denom];
        if (diff > 0) {
          shortageCounts[denom] = diff;
          targetAmount += denom * diff;
        }
      }

      if (targetAmount === 0) {
        document.getElementById("adjustmentResult").innerText = "不足がないため、調整の必要はありません。";
        document.getElementById("changeCollectionResult").innerText = "";
        return;
      }

      document.getElementById("adjustmentResult").innerText = "計算中...";
      await new Promise(r => setTimeout(r, 10)); 

      // 2. 余剰金（リソース）のリストアップ
      const surplusCoins = [];
      let totalSurplus = 0;
      for (let denom of denominations) {
        const surplus = input[denom] - baseTargets[denom];
        if (surplus > 0) {
          surplusCoins.push({ denom: denom, count: surplus });
          totalSurplus += denom * surplus;
        }
      }

      // 明らかに足りない場合
      if (totalSurplus < targetAmount) {
        document.getElementById("adjustmentResult").innerText = `※ 調整不可\n余剰金合計(${totalSurplus.toLocaleString()}円)が不足額(${targetAmount.toLocaleString()}円)より少ないため、両替できません。\n金庫から現金を足してください。`;
        document.getElementById("changeCollectionResult").innerText = "";
        return;
      }

      // 3. 探索（再帰探索でぴったり合う組み合わせを探す）
      const resultCombo = findExactCombination(surplusCoins, targetAmount);

      if (!resultCombo) {
        // 失敗時
        document.getElementById("adjustmentResult").innerText = `※ 調整失敗（ぴったり両替不可）\n不足額 ${targetAmount.toLocaleString()}円 を、手元の余剰金種だけでぴったり作ることができませんでした。\n（お釣りが発生する組み合わせしかありません）`;
        document.getElementById("changeCollectionResult").innerText = "";
        return;
      }

      // 4. 成功時の表示（元のUIエリアに出力）
      
      // adjustmentResult には「銀行へ持っていくもの（封筒）」を表示
      let adjustmentText = `【銀行へ持っていく】(封筒に入れる)\n`;
      let payTotalCheck = 0;
      const sortedComboKeys = Object.keys(resultCombo).map(Number).sort((a,b) => b - a);
      
      for (let denom of sortedComboKeys) {
        const count = resultCombo[denom];
        if (count > 0) {
          adjustmentText += `${denom}円×${count}枚 = ${(denom * count).toLocaleString()}円\n`;
          payTotalCheck += denom * count;
        }
      }
      adjustmentText += `合計　${payTotalCheck.toLocaleString()}円`;
      
      document.getElementById("adjustmentResult").innerText = adjustmentText;

      // changeCollectionResult には「銀行から戻ってきた後の補充（ドロア）」を表示
      let collectionText = `【銀行から戻ったら】(ドロアへ補充)\n`;
      for (let denom of denominations) {
        if (shortageCounts[denom]) {
           collectionText += `${denom}円×${shortageCounts[denom]}枚\n`;
        }
      }
      collectionText += `\nこれで準備金は 155,600円 になります。`; // 目標値固定前提のメッセージ

      document.getElementById("changeCollectionResult").innerText = collectionText;
    }

    // 再帰的に組み合わせを探す関数（ロジック部分は最新版）
    function findExactCombination(availableCoins, target) {
      const memo = new Map();

      function solve(index, currentTarget) {
        if (currentTarget === 0) return {}; 
        if (currentTarget < 0) return null; 
        if (index >= availableCoins.length) return null; 

        const key = `${index}-${currentTarget}`;
        if (memo.has(key)) return memo.get(key);

        const coin = availableCoins[index];
        const denom = coin.denom;
        const maxCount = coin.count;

        for (let i = Math.min(maxCount, Math.floor(currentTarget / denom)); i >= 0; i--) {
          const remaining = currentTarget - (denom * i);
          const result = solve(index + 1, remaining);
          
          if (result !== null) {
            if (i > 0) result[denom] = i;
            memo.set(key, result);
            return result;
          }
        }
        memo.set(key, null);
        return null;
      }
      return solve(0, target);
    }
  </script>
</body>
</html>
